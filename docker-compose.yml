version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: supply_chain_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-supply_chain}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  test_db:
    image: postgres:15-alpine
    container_name: supply_chain_test_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: supply_chain_test
    ports:
      - "5433:5432"

  adminer:
    image: adminer
    container_name: supply_chain_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: supply_chain_api
    volumes:
      - ./app:/app/app
      - ./ml_models:/app/ml_models
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
